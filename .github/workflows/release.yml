name: Build and Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Download Typst
        run: |
          curl -sL "https://github.com/typst/typst/releases/download/v0.14.2/typst-aarch64-apple-darwin.tar.xz" -o typst.tar.xz
          tar xJf typst.tar.xz --strip-components=1 "typst-aarch64-apple-darwin/typst"
          chmod +x typst
          # 移除 quarantine 标记并做 ad-hoc 签名，绕过 macOS Gatekeeper
          xattr -cr typst 2>/dev/null || true
          codesign --force --sign - typst 2>/dev/null || true

      - name: Install dependencies
        run: pip install flask openai pyyaml python-docx pypdf pywebview pyinstaller

      - name: Build .app
        run: |
          pyinstaller --name "CV-Assistant" --windowed --noconfirm \
            --hidden-import pypdf \
            --hidden-import docx \
            --hidden-import webview \
            --add-binary "typst:." \
            --add-data "templates:templates" \
            --add-data "prompts:prompts" \
            --add-data "fonts:fonts" \
            --add-data "install/.env.yaml.example:install" \
            launcher.py

      - name: Create DMG
        run: |
          brew install create-dmg
          create-dmg --volname "CV-Assistant" --window-pos 200 120 --window-size 500 300 \
            "dist/CV-Assistant.dmg" "dist/CV-Assistant.app"

      - name: Upload DMG to Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/CV-Assistant.dmg

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Download Typst
        shell: bash
        run: |
          curl -sL "https://github.com/typst/typst/releases/download/v0.14.0/typst-x86_64-pc-windows-msvc.zip" -o typst.zip
          unzip -q typst.zip
          mv typst-x86_64-pc-windows-msvc/typst.exe .
          rm -rf typst-x86_64-pc-windows-msvc typst.zip

      - name: Install dependencies
        run: pip install flask openai pyyaml python-docx pypdf pywebview pyinstaller

      - name: Build EXE
        shell: bash
        run: |
          pyinstaller --name "CV-Assistant" --windowed --noconfirm \
            --add-binary "typst.exe;." \
            --add-data "templates;templates" \
            --add-data "prompts;prompts" \
            --add-data "fonts;fonts" \
            --add-data "install/.env.yaml.example;install" \
            launcher.py

      - name: Zip EXE folder
        run: Compress-Archive -Path dist/CV-Assistant/* -DestinationPath dist/CV-Assistant-Windows.zip

      - name: Upload EXE to Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/CV-Assistant-Windows.zip
